<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The New Federalist Party | fgd135</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Courier+Prime&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root { --accent: #c5a059; --bg: #0d0e15; }
    body { background: var(--bg); color: #cbd5e1; font-family: 'Cormorant Garamond', serif; margin: 0; line-height: 1.6; overflow-x: hidden; }
    
    /* THE HEADER */
    .nfp-header {
      position: relative;
      height: 75vh; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #000;
      border-bottom: 2px solid var(--accent);
      overflow: hidden;
    }

    .flag-overlay {
      position: absolute;
      width: 120%;
      height: auto;
      opacity: 0.55; 
      filter: grayscale(0.2) contrast(1.2) brightness(0.7);
      pointer-events: none;
      z-index: 1;
    }

    .nfp-header::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(13,14,21,0.3) 0%, rgba(13,14,21,0.9) 90%);
      z-index: 2;
    }

    .nfp-header h1, .nfp-header span, .nfp-header p {
      z-index: 3;
      text-shadow: 0 0 25px rgba(0,0,0,1);
    }

    /* MORSE DATA STREAM EFFECT */
    .morse-stream {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 4;
      font-family: 'Courier Prime', monospace;
      color: var(--accent);
      letter-spacing: 4px;
      font-size: 14px;
      opacity: 0.8;
    }

    .morse-pulse {
      display: inline-block;
      animation: signal-blink 8s linear infinite;
    }

    @keyframes signal-blink {
      0% { opacity: 0; transform: translateY(5px); }
      5% { opacity: 1; transform: translateY(0); }
      95% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-5px); }
    }

    /* Interactive Toggle */
    #platform-toggle { display: none; }
    .full-platform { 
      max-height: 0; 
      overflow: hidden; 
      transition: max-height 0.8s ease-out, opacity 0.5s; 
      opacity: 0;
    }
    #platform-toggle:checked ~ .full-platform { 
      max-height: 8000px; 
      opacity: 1; 
    }

    .toggle-btn {
      display: inline-block;
      margin: 40px auto;
      padding: 12px 40px;
      border: 1px solid var(--accent);
      font-family: 'Courier Prime', monospace;
      color: var(--accent);
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }
    .toggle-btn:hover { background: var(--accent); color: #000; }
    #platform-toggle:checked ~ .toggle-btn { display: none; }

    .content-wrap { max-width: 850px; margin: 0 auto; padding: 60px 20px; text-align: left; }
    .preamble { font-size: 1.6rem; font-style: italic; color: #fff; border-left: 3px solid var(--accent); padding-left: 30px; margin-bottom: 40px; }
    
    h2 { font-family: 'Bebas Neue', sans-serif; color: var(--accent); font-size: 2.5rem; letter-spacing: 2px; border-bottom: 1px solid #1e293b; margin-top: 60px; padding-bottom: 10px; }
    h3 { font-family: 'Courier Prime', monospace; color: #fff; font-size: 1.3rem; margin-top: 30px; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 20px; padding-left: 25px; position: relative; }
    li::before { content: "»"; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

  </style>
</head>
<body>

<div class="nfp-header">
  <svg class="flag-overlay" viewBox="0 0 741 390" xmlns="http://www.w3.org/2000/svg">
